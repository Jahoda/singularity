<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a22"/>
      <stop offset="100%" stop-color="#0d0d0f"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="40%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark circular background -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>

  <!-- Subtle outer ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.15"/>

  <!-- Converging lines to center -->
  <g stroke="#c9a84c" stroke-width="0.8" opacity="0.3">
    <line x1="6" y1="6" x2="32" y2="32"/>
    <line x1="58" y1="6" x2="32" y2="32"/>
    <line x1="6" y1="58" x2="32" y2="32"/>
    <line x1="58" y1="58" x2="32" y2="32"/>
  </g>
  <g stroke="#c9a84c" stroke-width="0.6" opacity="0.2">
    <line x1="32" y1="4" x2="32" y2="32"/>
    <line x1="32" y1="60" x2="32" y2="32"/>
    <line x1="4" y1="32" x2="32" y2="32"/>
    <line x1="60" y1="32" x2="32" y2="32"/>
  </g>

  <!-- Concentric rings -->
  <circle cx="32" cy="32" r="18" fill="none" stroke="#c9a84c" stroke-width="0.4" opacity="0.12"/>
  <circle cx="32" cy="32" r="11" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.2"/>

  <!-- Central glow -->
  <circle cx="32" cy="32" r="14" fill="url(#glow)"/>

  <!-- Bright singularity core -->
  <circle cx="32" cy="32" r="5" fill="url(#coreGlow)"/>
  <circle cx="32" cy="32" r="2.5" fill="#c9a84c"/>
  <circle cx="32" cy="32" r="1.2" fill="#fff" opacity="0.9"/>
</svg>
