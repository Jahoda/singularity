<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#1a1a22"/>
      <stop offset="100%" stop-color="#0d0d0f"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#c9a84c" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0"/>
      <stop offset="30%" stop-color="#c9a84c" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#c9a84c" stop-opacity="1"/>
      <stop offset="70%" stop-color="#c9a84c" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lineGradV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0"/>
      <stop offset="40%" stop-color="#c9a84c" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#c9a84c" stop-opacity="0.2"/>
      <stop offset="60%" stop-color="#c9a84c" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </linearGradient>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.06">
    <line x1="200" y1="0" x2="200" y2="630" stroke="#c9a84c" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#c9a84c" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#c9a84c" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#c9a84c" stroke-width="0.5"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#c9a84c" stroke-width="0.5"/>
    <line x1="0" y1="157" x2="1200" y2="157" stroke="#c9a84c" stroke-width="0.5"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#c9a84c" stroke-width="0.5"/>
    <line x1="0" y1="472" x2="1200" y2="472" stroke="#c9a84c" stroke-width="0.5"/>
  </g>

  <!-- Central glow -->
  <ellipse cx="600" cy="280" rx="400" ry="250" fill="url(#glow)"/>

  <!-- Converging lines to singularity point -->
  <g opacity="0.15">
    <line x1="0" y1="0" x2="600" y2="280" stroke="#c9a84c" stroke-width="0.5"/>
    <line x1="1200" y1="0" x2="600" y2="280" stroke="#c9a84c" stroke-width="0.5"/>
    <line x1="0" y1="630" x2="600" y2="280" stroke="#c9a84c" stroke-width="0.5"/>
    <line x1="1200" y1="630" x2="600" y2="280" stroke="#c9a84c" stroke-width="0.5"/>
    <line x1="0" y1="280" x2="600" y2="280" stroke="#c9a84c" stroke-width="0.8"/>
    <line x1="1200" y1="280" x2="600" y2="280" stroke="#c9a84c" stroke-width="0.8"/>
    <line x1="600" y1="0" x2="600" y2="280" stroke="#c9a84c" stroke-width="0.8"/>
    <line x1="600" y1="630" x2="600" y2="280" stroke="#c9a84c" stroke-width="0.8"/>
  </g>

  <!-- Singularity point - bright dot -->
  <circle cx="600" cy="280" r="60" fill="url(#glow)" filter="url(#softGlow)" opacity="0.6"/>
  <circle cx="600" cy="280" r="3" fill="#c9a84c" opacity="0.9"/>
  <circle cx="600" cy="280" r="8" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.4"/>
  <circle cx="600" cy="280" r="18" fill="none" stroke="#c9a84c" stroke-width="0.3" opacity="0.25"/>
  <circle cx="600" cy="280" r="35" fill="none" stroke="#c9a84c" stroke-width="0.3" opacity="0.15"/>

  <!-- Decorative horizontal line above title -->
  <line x1="300" y1="220" x2="900" y2="220" stroke="url(#lineGrad)" stroke-width="0.5"/>

  <!-- Title: SINGULARITY -->
  <text x="600" y="295" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="400" letter-spacing="18" fill="#c9a84c" filter="url(#textGlow)">SINGULARITY</text>

  <!-- Decorative horizontal line below title -->
  <line x1="300" y1="320" x2="900" y2="320" stroke="url(#lineGrad)" stroke-width="0.5"/>

  <!-- Subtitle: THE LAST FOUNDER -->
  <text x="600" y="370" text-anchor="middle" font-family="'Courier New', monospace" font-size="18" letter-spacing="12" fill="#a1a1aa" opacity="0.7">THE LAST FOUNDER</text>

  <!-- Tagline -->
  <text x="600" y="430" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="17" fill="#a1a1aa" opacity="0.45" font-style="italic">Rok 2026. Tvoje AI je mocnejsi, nez jsi cekal.</text>

  <!-- Resource indicators at bottom -->
  <g transform="translate(340, 510)" opacity="0.5">
    <circle cx="0" cy="0" r="5" fill="#c9a84c"/>
    <text x="14" y="5" font-family="'Courier New', monospace" font-size="11" fill="#c9a84c" letter-spacing="2">FUNDS</text>

    <circle cx="130" cy="0" r="5" fill="#6eb5ff"/>
    <text x="144" y="5" font-family="'Courier New', monospace" font-size="11" fill="#6eb5ff" letter-spacing="2">TALENT</text>

    <circle cx="270" cy="0" r="5" fill="#7fda8f"/>
    <text x="284" y="5" font-family="'Courier New', monospace" font-size="11" fill="#7fda8f" letter-spacing="2">ETHICS</text>

    <circle cx="410" cy="0" r="5" fill="#c688f0"/>
    <text x="424" y="5" font-family="'Courier New', monospace" font-size="11" fill="#c688f0" letter-spacing="2">INNOVATION</text>
  </g>

  <!-- Bottom decorative line -->
  <line x1="100" y1="560" x2="1100" y2="560" stroke="url(#lineGrad)" stroke-width="0.3" opacity="0.3"/>

  <!-- Subtle corner accents -->
  <g opacity="0.2" stroke="#c9a84c" stroke-width="1" fill="none">
    <polyline points="30,30 30,70 70,70"/>
    <polyline points="1170,30 1170,70 1130,70"/>
    <polyline points="30,600 30,560 70,560"/>
    <polyline points="1170,600 1170,560 1130,560"/>
  </g>
</svg>
